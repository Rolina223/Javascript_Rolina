<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    
    <title>ToDo</title>
</head>

<body>
    <div class="container">
          <h3>My To-Do-Lists</h3>
            <div class="inputAdd">
                <input type="text" class="task_inp"
                placeholder="Enter a new Task">
                <button class="AddBtn">Add task</button>
            </div>
            <ul class="tasklist">
                <li class="taskItems">
                    <input type="checkbox">
                    <span>Neptune</span>  
                    <button class="DelBtn">Delete</button>
                </li>
  
            </ul>
    </div>
    <div>
    <script src="script.js"></script>
</div>
</body>
</html>
