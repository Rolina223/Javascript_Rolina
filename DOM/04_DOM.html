<script>
   
   //Function to create paragraph

   function createParagrph(para)
   {
     const text = document.createElement('p')
     text.innerText = para
     document.body.appendChild(text)
   }

   function createHeading(headText)
   {
    const text = document.createElement('h2')
    text.innerText = headText
    document.body.appendChild(text)
   }
   
   createHeading("DOM sikh rha hu")
   createParagrph("Thora bahut sikh liya")
