<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body style="background-color: rgba(255, 5, 5, 0.44); color: chartreuse;">

    <ul class="Main">
        <li>DHAKA</li>
    </ul>
    
</body>

<script>

    function addLanguage(addLang){

        const li = document.createElement('li')
        li.innerHTML = `${addLang}`
        document.querySelector('.Main').appendChild(li)

    }

    //Optimized way

    function optiAddLang(addLang){
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(addLang))

    }

    addLanguage("Java")
    addLanguage(".net")
    addLanguage("CPP") 

    
</script>


</html>
